<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="UTF-8">
	<title>ボイロフレーズジェネレーター</title>
	<meta name="description" content="VOICEROIDのフレーズ辞書に登録された文をもとに、文を自動生成するサイトです。">
	<meta name="author" content="民火">
	<meta property="og:title" content="ボイロフレーズジェネレーター">
	<meta property="og:description" content="VOICEROIDのフレーズ辞書に登録された文をもとに、文を自動生成するサイトです。">
	<meta property="og:url" content="https://tammybee.github.io/voiceroid_phrase_generator/">
	<meta property="og:image" content="ogp.png">
	<script type="text/javascript" src="main.js" charset="UTF-8"></script>
</head>

<body>
	<header>
		<h1>ボイロフレーズジェネレーター</h1>
		<p>
			VOICEROIDのフレーズ辞書に登録された文をもとに、マルコフ連鎖で文を自動生成するサイトです。
		</p>
	</header>

	<main>
		<section id="section_build_model">
			<h2>モデル生成</h2>
			<form id="form_build_model">
				<div>
					<p>
						フレーズ辞書ファイル(*.pdic)を選択してください。<br>
						VOICEROID2エディタの場合、フレーズ辞書の場所は「ツール > オプション > ユーザー辞書 > フレーズ辞書」から確認することができます。
					</p>
					<table>
						<tr>
							<td>フレーズ辞書</td>
							<td><input type="file" id="input_txt_file" accept=".pdic"></td>
						</tr>
					</table>
				</div>
				<br>

				<input type="button" id="button_build_model" value="モデル生成">
			</form>
		</section>

		<section id="section_show_model">
			<h2>現在のモデル</h2>
			<table>
				<tr>
					<td>フレーズ数</td>
					<td id="view_model_info_number_of_phrases">-</td>
				</tr>
				<tr>
					<td>単語数</td>
					<td id="view_model_info_number_of_segments">-</td>
				</tr>
			</table>
		</section>

		<section id="section_generate_sentences">
			<h2>文生成</h2>
			<form id="form_generate_sentences">
				<table>
					<tr>
						<td><label for="input_start_word">最初の単語</label></td>
						<td><input type="text" id="input_start_word" value="" /></td>
					</tr>
					<tr>
						<td><label for="input_contain_string">含まれる文字列</label></td>
						<td><input type="text" id="input_contain_string" value="" /></td>
					</tr>
					<tr>
						<td><label for="input_number_of_sentences">生成する文の数</label></td>
						<td><input type="number" id="input_number_of_sentences" value="10" min="1" /></td>
					</tr>
					<tr>
						<td><label for="input_min_sentence_length">生成する文の長さの最小値</label></td>
						<td><input type="number" id="input_min_sentence_length" value="20" min="1" /></td>
					</tr>
					<tr>
						<td><label for="input_max_sentence_length">生成する文の長さの最大値</label></td>
						<td><input type="number" id="input_max_sentence_length" value="120" min="1" /></td>
					</tr>
					<tr>
						<td><label for="input_max_number_of_trials">文生成の最大試行回数</label></td>
						<td><input type="number" id="input_max_number_of_trials" value="100" min="1" /></td>
					</tr>
					<tr>
						<td><label for="checkbox_to_halfwidth">英数字を半角に変換</label></td>
						<td><input type="checkbox" id="checkbox_to_halfwidth" checked="checked"></td>
					</tr>
				</table>
				<input type="button" id="button_generate_sentences" value="文生成" disabled>
			</form>
		</section>

		<section id="section_show_generated_sentences">
			<h2>生成結果</h2>
			<div id="view_result_generated_sentences" />
		</section>
	</main>

	<footer>
		<address>
			作者:民火(Twitter:<a href="https://twitter.com/tammybee_tmb" target="_blank">@tammybee_tmb</a>)
		</address>
	</footer>
</body>

</html>
